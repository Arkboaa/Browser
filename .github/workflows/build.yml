name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.3, v1.4 gibi tag oluşturduğunda çalışır

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish WinForms App
      # Proje klasör adını ve .csproj adını GT3RS olarak güncellediğini varsayıyorum
      # Eğer klasör adın hala WinFormsApp1 ise "GT3RS/GT3RS.csproj" kısmını ona göre düzelt
      run: |
        dotnet publish GT3RS/GT3RS.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -o ./publish

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        # Sadece oluşan tek parça .exe dosyasını release'e ekler
        files: ./publish/GT3RS.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}